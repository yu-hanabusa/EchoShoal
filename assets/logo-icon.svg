<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#1b4d5e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#26c6da"/>
    </linearGradient>
    <linearGradient id="fish1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="fish2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#00acc1"/>
    </linearGradient>
    <linearGradient id="fish3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#4dd0e1"/>
    </linearGradient>
  </defs>

  <!-- Background (medium-dark teal-navy) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Echo ripples (more visible) -->
  <circle cx="256" cy="260" r="90" stroke="url(#wave)" stroke-width="4" opacity="0.7" fill="none"/>
  <circle cx="256" cy="260" r="145" stroke="url(#wave)" stroke-width="3.5" opacity="0.5" fill="none"/>
  <circle cx="256" cy="260" r="200" stroke="url(#wave)" stroke-width="3" opacity="0.32" fill="none"/>

  <!-- Lead fish (large) -->
  <g transform="translate(296, 252) scale(2.2)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish1)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish1)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
    <path d="M-4,-11 Q2,-22 10,-12" fill="url(#fish1)" opacity="0.7"/>
  </g>

  <!-- Mid fish upper -->
  <g transform="translate(200, 206) scale(1.6)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish2)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish2)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
    <path d="M-4,-11 Q2,-22 10,-12" fill="url(#fish2)" opacity="0.7"/>
  </g>

  <!-- Mid fish lower -->
  <g transform="translate(208, 304) scale(1.6)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish2)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish2)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
    <path d="M-4,-11 Q2,-22 10,-12" fill="url(#fish2)" opacity="0.7"/>
  </g>

  <!-- Trailing fish top -->
  <g transform="translate(130, 186) scale(1.2)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish3)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish3)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
  </g>

  <!-- Trailing fish mid -->
  <g transform="translate(122, 252) scale(1.2)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish3)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish3)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
  </g>

  <!-- Trailing fish bottom -->
  <g transform="translate(136, 322) scale(1.2)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish3)"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish3)"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137"/>
  </g>

  <!-- Far trailing tiny -->
  <g transform="translate(72, 218) scale(0.9)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish3)" opacity="0.75"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish3)" opacity="0.75"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa" opacity="0.75"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137" opacity="0.75"/>
  </g>
  <g transform="translate(66, 280) scale(0.9)">
    <ellipse cx="0" cy="0" rx="24" ry="12" fill="url(#fish3)" opacity="0.75"/>
    <path d="M-22,-2 L-38,-16 L-34,0 L-38,16 L-22,2 Z" fill="url(#fish3)" opacity="0.75"/>
    <circle cx="14" cy="-3" r="3.5" fill="#e0f7fa" opacity="0.75"/>
    <circle cx="14.8" cy="-3.2" r="1.8" fill="#0d2137" opacity="0.75"/>
  </g>
</svg>
